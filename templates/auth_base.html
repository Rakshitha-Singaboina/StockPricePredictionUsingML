<!DOCTYPE html>
<html>
<head>
    <title>Auth - Stock AI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin:0;
            font-family: 'Inter', sans-serif;
            height:100vh;
            display:flex;
            overflow:hidden;
        }

        /* LEFT SIDE (BRANDING) */
        .left {
            flex:1;
            background: linear-gradient(135deg,#6366f1,#3b82f6);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            padding:40px;
            text-align:center;
        }

        .left h1 {
            font-size: 42px;
            font-weight: 700;
        }

        .left p {
            margin-top:10px;
            opacity: 0.8;
        }

        /* RIGHT SIDE (FORM) */
        .right {
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8fafc;
        }

        /* FORM CARD */
        .form-box {
            width:350px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .form-box h2 {
            text-align:center;
            margin-bottom:20px;
        }

        /* INPUT */
        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:1px solid #ddd;
            outline:none;
            transition:0.2s;
        }

        input:focus {
            border-color:#6366f1;
        }

        /* BUTTON */
        .btn {
            width:100%;
            padding:12px;
            background:#6366f1;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        .btn:hover {
            background:#4f46e5;
        }

        /* LINKS */
        .link {
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .link a {
            color:#6366f1;
            text-decoration:none;
        }

        .link a:hover {
            text-decoration:underline;
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            .left {
                display:none;
            }
            .right {
                flex:1;
            }
        }

    </style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
    <h1>📊 Stock AI</h1>
    <p>Predict smarter with AI & Deep Learning</p>
</div>

<!-- RIGHT SIDE -->
<div class="right">
    {% block content %}{% endblock %}
</div>

</body>
</html>
